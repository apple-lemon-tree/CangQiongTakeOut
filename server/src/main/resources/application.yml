spring:
  profiles:
    active: dev
  application:
    name: cangqiong-takeout
  datasource:
    url: jdbc:mysql://localhost:3306/sky_take_out
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  data:
    redis:
      host: 192.168.100.128
      port: 6379
      password: 123456
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
      database: 0
  cache:
    type: redis
    redis:
      # 30 * 60 * 1000  30分钟
      time-to-live: 1800000
      # 是否允许缓存空值，默认是false，开启后可以解决缓存穿透问题
      cache-null-values: true


mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

aliyun:
  oss:
    endpoint: ${cqwm.aliyun.oss.endpoint}
    bucketName: ${cqwm.aliyun.oss.bucketName}
    region: ${cqwm.aliyun.oss.region}

jwt:
  secret-key: ${cqwm.jwt.secre-key}
  expiration : ${cqwm.jwt.expiration} # 3600 * 1000 * 10 10个小时


wechat:
  appid: ${cqwm.wechat.appid}
  secret: ${cqwm.wechat.secret}



