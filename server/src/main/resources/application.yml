spring:
  profiles:
    active: dev
  application:
    name: cangqiong-takeout
  datasource:
    url: jdbc:mysql://localhost:3306/sky_take_out
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  data:
    redis:
      host: 192.168.100.128
      port: 6379
      password: 123456
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s

mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml

aliyun:
  oss:
    endpoint: ${cqwm.aliyun.oss.endpoint}
    bucketName: ${cqwm.aliyun.oss.bucketName}
    region: ${cqwm.aliyun.oss.region}

jwt:
  admin-secret-key: ${cqwm.jwt.admin-secre-key}
  admin-expiration : ${cqwm.jwt.admin-expiration} # 3600 * 1000 * 10 10个小时
  user-secret-key: ${cqwm.jwt.user-secret-key}
  user-expiration: ${cqwm.jwt.user-expiration}
  user-token-name: ${cqwm.jwt.user-token-name}

wechat:
  appid: ${cqwm.wechat.appid}
  secret: ${cqwm.wechat.secret}



